<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyGPT - ChatGPT 账号注册工具</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>SkyGPT</h1>
            <p>ChatGPT 账号自动注册工具 - 支持 CPA 认证文件生成</p>
            <nav>
                <a href="/">注册</a>
                <a href="/tasks">任务</a>
                <a href="/proxies">代理</a>
                <a href="/cpa">CPA文件</a>
            </nav>
        </header>

        <main>
            <section class="registration-form">
                <h2>创建注册任务</h2>
                <form id="registrationForm">
                    <div class="form-group">
                        <label for="registrationMode">注册模式</label>
                        <select id="registrationMode" name="registrationMode">
                            <option value="email">邮箱注册</option>
                            <option value="phone">手机号框架（多短信平台）</option>
                        </select>
                        <small style="display:block; margin-top:6px; color:#666;">手机号模式当前只会执行接码状态机，不会提交 OpenAI 手机验证。</small>
                    </div>

                    <div class="form-group">
                        <label for="email">邮箱地址 *</label>
                        <input type="email" id="email" name="email" required placeholder="your.email@example.com">
                    </div>

                    <div id="phoneModeSection" style="display: none;">
                        <div class="form-group">
                            <label for="phoneCountry">接码国家/地区</label>
                            <input type="text" id="phoneCountry" name="phoneCountry" placeholder="例如 0 / hk / us">
                        </div>

                        <div class="form-group">
                            <label for="smsServiceCode">短信服务代码</label>
                            <input type="text" id="smsServiceCode" name="smsServiceCode" placeholder="例如 openai / go / ot">
                        </div>

                        <div class="form-group">
                            <label for="smsOperator">运营商（可选）</label>
                            <input type="text" id="smsOperator" name="smsOperator" placeholder="可留空，使用默认运营商筛选">
                        </div>

                        <div class="form-group">
                            <label for="smsProvider">短信平台</label>
                            <select id="smsProvider" name="smsProvider">
                                <option value="hero_sms">HeroSMS</option>
                                <option value="sms_activate">SMS-Activate</option>
                                <option value="api_cc">api.cc（预留）</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="smsApiKey">短信平台 API Key（可选覆盖）</label>
                            <input type="password" id="smsApiKey" name="smsApiKey" placeholder="不填则使用服务端对应 provider 的环境变量">
                        </div>

                        <div class="form-group">
                            <label for="smsBaseUrl">短信平台 Base URL（可选覆盖）</label>
                            <input type="text" id="smsBaseUrl" name="smsBaseUrl" placeholder="不填则使用服务端 provider 默认地址">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="name">显示名称（可选）</label>
                        <input type="text" id="name" name="name" placeholder="自动生成随机名称">
                    </div>

                    <div class="form-group">
                        <label for="birthday">生日（可选）</label>
                        <input type="date" id="birthday" name="birthday" value="2000-01-01">
                    </div>

                    <div class="form-group">
                        <label>代理配置</label>
                        <select id="proxySource" name="proxySource">
                            <option value="none">不使用代理</option>
                            <option value="manual">手动输入代理</option>
                            <option value="subscription">订阅导入</option>
                            <option value="pool">代理池</option>
                        </select>
                    </div>

                    <div id="proxyManualSection" class="form-group proxy-section" style="display: none;">
                        <label for="proxyManual">代理地址</label>
                        <input type="text" id="proxyManual" name="proxyManual" placeholder="socks5://user:pass@host:port">
                        <button type="button" id="testProxyBtn" class="btn-test">测试代理</button>
                        <div id="proxyTestResult" class="test-result"></div>
                    </div>

                    <div id="proxySubscriptionSection" class="form-group proxy-section" style="display: none;">
                        <label for="subscriptionUrl">订阅链接</label>
                        <input type="text" id="subscriptionUrl" name="subscriptionUrl" placeholder="https://example.com/subscribe">
                        <button type="button" id="importSubscriptionBtn" class="btn-import">导入订阅</button>
                        <div id="subscriptionNodes" class="nodes-list"></div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-primary">开始注册</button>
                        <button type="reset" class="btn-secondary">重置</button>
                    </div>
                </form>

                <div id="taskResult" class="task-result"></div>
            </section>

            <section class="concurrent-config">
                <h2>并发配置</h2>
                <div class="form-group">
                    <label for="concurrentCount">并发数量</label>
                    <input type="number" id="concurrentCount" name="concurrentCount" value="1" min="1" max="10">
                </div>
            </section>
        </main>

        <footer>
            <p>SkyGPT &copy; 2026 - Powered by Flask</p>
        </footer>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
