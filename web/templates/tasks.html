<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务管理 - SkyGPT</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .progress-container {
            margin: 20px 0;
        }
        .progress-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
        }
        .step-item {
            flex: 1;
            text-align: center;
            position: relative;
            padding: 15px 5px;
        }
        .step-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #ddd;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            transition: all 0.3s;
        }
        .step-item.pending .step-circle {
            background: #ddd;
        }
        .step-item.running .step-circle {
            background: #3498db;
            animation: pulse 1.5s infinite;
        }
        .step-item.completed .step-circle {
            background: #27ae60;
        }
        .step-item.waiting .step-circle {
            background: #f39c12;
        }
        .step-item.failed .step-circle {
            background: #e74c3c;
        }
        .step-name {
            font-size: 12px;
            color: #2c3e50;
            margin-top: 5px;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .logs-container {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 8px;
            height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
        .log-entry {
            margin-bottom: 5px;
            padding: 2px 0;
        }
        .log-entry.INFO { color: #d4d4d4; }
        .log-entry.SUCCESS { color: #4ec9b0; }
        .log-entry.WARNING { color: #dcdcaa; }
        .log-entry.ERROR { color: #f48771; }
        .log-time {
            color: #858585;
        }
        .otp-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .otp-modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            text-align: center;
        }
        .otp-input {
            font-size: 24px;
            text-align: center;
            letter-spacing: 5px;
            padding: 10px;
        }
        .task-controls {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>SkyGPT</h1>
            <nav>
                <a href="/">注册</a>
                <a href="/tasks" class="active">任务</a>
                <a href="/proxies">代理</a>
                <a href="/cpa">CPA文件</a>
            </nav>
        </header>

        <main>
            <section class="tasks-list">
                <h2>任务列表</h2>
                <div class="tasks-controls">
                    <select id="statusFilter">
                        <option value="">所有状态</option>
                        <option value="pending">等待中</option>
                        <option value="running">进行中</option>
                        <option value="waiting_for_input">等待输入</option>
                        <option value="success">成功</option>
                        <option value="failed">失败</option>
                        <option value="cancelled">已取消</option>
                    </select>
                    <button id="refreshTasksBtn" class="btn-secondary">刷新列表</button>
                </div>
                <div id="tasksTable"></div>
            </section>

            <section class="task-detail" id="taskDetailSection" style="display: none;">
                <h2>任务详情 - <span id="taskEmail"></span></h2>
                
                <div class="task-controls">
                    <span>状态: <strong id="taskStatus"></strong></span>
                    <button id="cancelTaskBtn" class="btn-test" style="background: #e74c3c;">取消任务</button>
                </div>

                <div class="progress-container">
                    <h3>注册进度</h3>
                    <div class="progress-bar" id="progressBar"></div>
                </div>

                <div class="logs-container" id="logsContainer">
                    <div style="color: #858585;">等待任务启动...</div>
                </div>
            </section>
        </main>

        <div class="otp-modal" id="otpModal" style="display: none;">
            <div class="otp-modal-content">
                <h2>请输入验证码</h2>
                <p id="otpPromptText"></p>
                <form id="otpForm">
                    <div id="emailOtpGroup">
                        <label>邮箱验证码（6位）</label>
                        <input type="text" id="emailOtpInput" class="otp-input" maxlength="6" placeholder="000000">
                    </div>
                    <div id="phoneOtpGroup" style="display: none;">
                        <label>手机号码</label>
                        <input type="text" id="phoneNumberInput" placeholder="手机号码">
                        <label>手机验证码（6位）</label>
                        <input type="text" id="phoneOtpInput" class="otp-input" maxlength="6" placeholder="000000">
                    </div>
                    <div style="margin-top: 20px;">
                        <button type="submit" class="btn-primary">提交验证码</button>
                        <button type="button" id="cancelOtpBtn" class="btn-secondary">取消注册</button>
                    </div>
                </form>
            </div>
        </div>

        <footer>
            <p>SkyGPT &copy; 2026 - WebSocket 实时推送</p>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.min.js"></script>
    <script src="/static/js/tasks.js"></script>
</body>
</html>
